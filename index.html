<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>بوابة المشروع — روف الشرق و ZBOM</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Segoe UI", "Tahoma", Arial, sans-serif;
  direction: rtl;
  /* نفس التدرج اللوني العميق للخلفية */
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  background-attachment: fixed;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  color: #F8FAFC;
}

/* ── تأثير الزجاج (Glassmorphism) ── */
.glass-panel {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.box { 
  text-align: center; 
  padding: 40px;
  width: 90%;
  max-width: 550px;
}

/* ── منطقة اللوجوهات ── */
.logos {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}
.logo-ruoff { 
  height: 75px; 
  object-fit: contain;
  mix-blend-mode: screen; /* مسح الخلفية السوداء */
}
.logo-twing { 
  height: 50px; 
  object-fit: contain;
  background: transparent;
}

/* ── العناوين ── */
h2 {
  margin-bottom: 35px;
  font-size: 22px;
  font-weight: 800;
  background: linear-gradient(90deg, #FEE140 0%, #FA709A 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.6;
}

/* ── الأزرار ── */
a {
  display: block;
  background: rgba(255, 255, 255, 0.03);
  color: #38BDF8;
  border: 1px solid rgba(56, 189, 248, 0.3);
  border-radius: 12px;
  padding: 18px 30px;
  margin: 16px 0;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

a:hover { 
  background: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%); 
  color: #fff; 
  border-color: transparent;
  box-shadow: 0 8px 25px rgba(0, 198, 255, 0.4);
  transform: translateY(-4px);
}

.footer-text {
  font-size: 12px;
  color: #94A3B8;
  margin-top: 25px;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div class="box glass-panel">
  
  <div class="logos">
    <img class="logo-ruoff" src="IMG_3321.JPG.jpeg" alt="Ruoff Al-Sharq">
    <img class="logo-twing" src="blue gradient.png" alt="T-Wing">
  </div>

  <h2>بوابة ملفات مشروع ويب سايت وتطبيق<br> روف الشرق - ZBOM</h2>
  
  <a href="خطة_مشروع_روف_الشرق_ZBOM.html">📄 عرض خطة المشروع والتسعير</a>
  <a href="Checklist_المطلوب_من_العميل.html">✅ عرض قائمة المتطلبات (Checklist)</a>

  <div class="footer-text">
    PREPARED BY T-WING AGENCY
  </div>
</div>

</body>
</html>
